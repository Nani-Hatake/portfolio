# Render Blueprint — deploys ONLY the web service.
# The database is a free, permanent Neon PostgreSQL (neon.tech), NOT Render's
# expiring free DB. You paste the Neon connection string into DATABASE_URL when
# prompted (see DEPLOY.md → "Free permanent database with Neon").
#
# In Render: New +  ->  Blueprint  ->  connect this repo.

services:
  - type: web
    name: portfolio
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Portfolio.Api/Dockerfile
    dockerContext: ./Portfolio.Api
    healthCheckPath: /api/projects
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Neon PostgreSQL connection string — you paste this in the dashboard.
      # Format: postgresql://user:password@ep-xxx.REGION.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false
      # JWT signing secret — Render generates a strong random value.
      - key: Jwt__Key
        generateValue: true
      # Owner login — you set these in the dashboard when prompted.
      - key: Admin__Username
        sync: false
      - key: Admin__Password
        sync: false
