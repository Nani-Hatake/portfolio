# Render Blueprint — deploys the portfolio web service + a free PostgreSQL database.
# In Render: New +  ->  Blueprint  ->  connect this repo. Render reads this file.
# You will be asked to fill the two "sync: false" values (admin username/password).

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfoliodb
    user: portfolio

services:
  - type: web
    name: portfolio
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Portfolio.Api/Dockerfile
    dockerContext: ./Portfolio.Api
    healthCheckPath: /api/projects
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Postgres connection URL, injected automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      # JWT signing secret — Render generates a strong random value.
      - key: Jwt__Key
        generateValue: true
      # Owner login — you set these in the Render dashboard when prompted.
      - key: Admin__Username
        sync: false
      - key: Admin__Password
        sync: false
